<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Discord Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/wordcloud@1/src/wordcloud2.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2/dist/css/tom-select.css">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2/dist/js/tom-select.complete.min.js"></script>
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #0f3460;
            --accent: #e94560;
            --text-primary: #eee;
            --text-secondary: #aaa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        nav {
            background: var(--bg-secondary);
            padding: 1rem 2rem;
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav h1 { font-size: 1.4rem; }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card h2 {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .grid .card { margin-bottom: 0; }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 1.25rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-card .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .emoji-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .emoji-item {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            background: var(--bg-card);
            padding: 0.4rem 0.75rem;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .emoji-item .emoji-count {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .empty-state {
            color: var(--text-secondary);
            text-align: center;
            padding: 2rem;
        }

        /* Tom Select dark theme overrides */
        .ts-wrapper .ts-control {
            background: var(--bg-card);
            border-color: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
        }
        .ts-wrapper .ts-control input { color: var(--text-primary); }
        .ts-wrapper .ts-dropdown {
            background: var(--bg-card);
            border-color: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }
        .ts-wrapper .ts-dropdown .active {
            background: var(--accent);
            color: #fff;
        }
        .ts-wrapper .ts-dropdown .option:hover {
            background: rgba(233, 69, 96, 0.3);
        }
        .ts-wrapper.focus .ts-control {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(233, 69, 96, 0.2);
        }
        /* Sticky range bar (shared) */
        .sticky-range-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: var(--bg-secondary);
            border-bottom: 2px solid var(--accent);
            padding: 0.4rem 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            opacity: 0;
            transform: translateY(-100%);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
        }
        .sticky-range-bar.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .sticky-range-bar a,
        .sticky-range-bar button {
            padding: 0.25rem 0.7rem;
            border-radius: 6px;
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
        }
        .sticky-range-bar a:hover,
        .sticky-range-bar button:hover {
            color: var(--text-primary);
            border-color: var(--accent);
        }
        .sticky-range-bar a.active,
        .sticky-range-bar button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav>
        <h1>Discord Analytics Dashboard</h1>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/user">User Stats</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
