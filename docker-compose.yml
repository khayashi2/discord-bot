services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    command: python -m bot.main
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build: .
    command: python -m dashboard.app
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  migrate:
    build: .
    command: alembic upgrade head
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - migration

  backfill:
    build: .
    command: python -m scripts.backfill
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - backfill

volumes:
  postgres_data:
