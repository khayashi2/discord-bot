name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check .

      - name: Run ruff formatter check
        run: ruff format --check .

  test:
    name: Test
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: discord_bot
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: discord_analytics_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U discord_bot -d discord_analytics_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          POSTGRES_USER: discord_bot
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: discord_analytics_test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          DATABASE_URL: "postgresql+asyncpg://discord_bot:test_password@localhost:5432/discord_analytics_test"
          DISCORD_TOKEN: "fake-token-for-testing"
          DISCORD_GUILD_ID: "0"
        run: pytest tests/ -v

  docker:
    name: Docker Build
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t discord-analytics-bot .
